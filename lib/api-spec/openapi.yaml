openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Respect Family API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: me
  - name: streamers
  - name: requests
  - name: favorites
  - name: stats
  - name: admin
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [me]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /streamers:
    get:
      operationId: listStreamers
      tags: [streamers]
      summary: List approved streamers with live stream info
      parameters:
        - in: query
          name: search
          required: false
          schema:
            type: string
        - in: query
          name: live
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Streamer"
    post:
      operationId: createStreamer
      tags: [streamers]
      summary: Admin — add a channel directly
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStreamerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Streamer"

  /streamers/{username}:
    get:
      operationId: getStreamer
      tags: [streamers]
      summary: Get a single streamer with live info
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Streamer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Streamer"
    delete:
      operationId: deleteStreamer
      tags: [streamers]
      summary: Admin — remove a channel
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /channel-requests:
    get:
      operationId: listChannelRequests
      tags: [requests]
      summary: Admin — list channel requests
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected]
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChannelRequest"
    post:
      operationId: createChannelRequest
      tags: [requests]
      summary: Submit a channel request (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequestInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelRequest"

  /channel-requests/{id}:
    patch:
      operationId: updateChannelRequest
      tags: [requests]
      summary: Admin — approve or reject
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChannelRequestInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChannelRequest"

  /favorites:
    get:
      operationId: listFavorites
      tags: [favorites]
      summary: Current user's favorite streamers (with live info)
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Streamer"
    post:
      operationId: addFavorite
      tags: [favorites]
      summary: Add a streamer to favorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddFavoriteInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Favorite"

  /favorites/{username}:
    delete:
      operationId: removeFavorite
      tags: [favorites]
      summary: Remove a favorite
      parameters:
        - in: path
          name: username
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /admin-emails:
    get:
      operationId: listAdminEmails
      tags: [admin]
      summary: List admin emails (admin only)
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminEmail"
    post:
      operationId: addAdminEmail
      tags: [admin]
      summary: Grant admin access to an email (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddAdminEmailInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminEmail"

  /admin-emails/{email}:
    delete:
      operationId: removeAdminEmail
      tags: [admin]
      summary: Revoke admin access from an email (admin only)
      parameters:
        - in: path
          name: email
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Removed

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Community summary — total channels, live now, total viewers, pending requests
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Stats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Me:
      type: object
      properties:
        signedIn:
          type: boolean
        userId:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        firstName:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]
        isAdmin:
          type: boolean
        favoriteCount:
          type: integer
      required: [signedIn, isAdmin, favoriteCount]

    Streamer:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        profilePictureUrl:
          type: ["string", "null"]
        bannerUrl:
          type: ["string", "null"]
        channelUrl:
          type: string
        isLive:
          type: boolean
        followers:
          type: integer
        viewers:
          type: integer
        streamTitle:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        promoted:
          type: boolean
        addedAt:
          type: string
          format: date-time
        lastSyncedAt:
          type: ["string", "null"]
          format: date-time
      required:
        - id
        - username
        - displayName
        - channelUrl
        - isLive
        - followers
        - viewers
        - promoted
        - addedAt

    CreateStreamerInput:
      type: object
      properties:
        username:
          type: string
        promoted:
          type: boolean
      required: [username]

    ChannelRequest:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        submitterName:
          type: ["string", "null"]
        submitterEmail:
          type: ["string", "null"]
        note:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string
          format: date-time
        decidedAt:
          type: ["string", "null"]
          format: date-time
      required: [id, username, status, createdAt]

    CreateChannelRequestInput:
      type: object
      properties:
        username:
          type: string
        submitterName:
          type: string
        submitterEmail:
          type: string
        note:
          type: string
      required: [username]

    UpdateChannelRequestInput:
      type: object
      properties:
        status:
          type: string
          enum: [approved, rejected]
      required: [status]

    Favorite:
      type: object
      properties:
        username:
          type: string
        addedAt:
          type: string
          format: date-time
      required: [username, addedAt]

    AddFavoriteInput:
      type: object
      properties:
        username:
          type: string
      required: [username]

    AdminEmail:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        addedAt:
          type: string
          format: date-time
        addedBy:
          type: ["string", "null"]
      required: [id, email, addedAt]

    AddAdminEmailInput:
      type: object
      properties:
        email:
          type: string
      required: [email]

    Stats:
      type: object
      properties:
        totalChannels:
          type: integer
        liveNow:
          type: integer
        totalViewers:
          type: integer
        totalFollowers:
          type: integer
        pendingRequests:
          type: integer
        topLive:
          type: array
          items:
            $ref: "#/components/schemas/Streamer"
      required:
        - totalChannels
        - liveNow
        - totalViewers
        - totalFollowers
        - pendingRequests
        - topLive
